<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幕前 Stage | 台灣展演 AI 懶人包</title>
    <style>
        :root { --primary: #6366f1; --bg: #fdfdfd; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding-bottom: 50px; }
        
        /* 🎨 藝術化大改版：上半部極光Header */
        header { 
            position: relative;
            background-color: #0d1117; /* 深色底，讓極光更明顯 */
            /* 💡 極光效果：利用複數放射性漸層混合 */
            background-image: 
                radial-gradient(at 10% 10%, #4f46e5 0px, transparent 50%),
                radial-gradient(at 90% 20%, #7e22ce 0px, transparent 50%),
                radial-gradient(at 50% 90%, #f43f5e 0px, transparent 50%),
                radial-gradient(at 20% 80%, #10b981 0px, transparent 50%);
            color: white; 
            padding: 80px 20px 100px 20px; 
            text-align: center; 
            overflow: hidden;
            clip-path: ellipse(150% 100% at 50% 0%); /* 維持優雅弧線 */
        }

        /* 💡 藝術化大改版：淡淡的網格幾何點綴 */
        header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none; /* 讓點點不影響點擊 */
        }

        /* 增強標題視覺 */
        h1 { 
            font-size: 3.2rem; 
            margin: 0; 
            font-weight: 900; 
            letter-spacing: -2px; 
            position: relative; z-index: 10; /* 確保在網格上方 */
            text-shadow: 0 4px 15px rgba(0,0,0,0.5); /* 增加立體感 */
        }

        /* 💡 亮點配色：金屬萊姆綠，跳色藝術感 */
        h1 span.logo-stage { 
            color: #bef264; 
            background: linear-gradient(135deg, #bef264 0%, #a3e635 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { 
            opacity: 0.8; 
            font-weight: 300; 
            margin-top: 15px; 
            font-size: 1.1rem; 
            position: relative; z-index: 10;
        }

        /* 篩選按鈕列 (維持毛玻璃感) */
        .filter-wrapper { position: sticky; top: 0; background: rgba(253,253,253,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100; padding: 15px 0; border-bottom: 1px solid #eee; }
        .filter-bar { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 10px 24px; border-radius: 50px; border: 1px solid #e2e8f0; background: white; white-space: nowrap; cursor: pointer; font-weight: 600; color: #64748b; font-size: 0.95rem; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        /* 內容區塊 */
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        /* 卡片設計升級 */
        .card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.08); border: 1px solid #f1f5f9; transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.12); }
        .card-img { width: 100%; height: 220px; object-fit: cover; background: #e2e8f0; }
        .card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        
        h3 { margin: 0 0 15px 0; font-size: 1.3rem; line-height: 1.4; color: #0f172a; height: 3.7rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .meta { font-size: 0.88rem; color: #64748b; margin-bottom: 6px; }

        .ai-box { background: #f5f3ff; border-radius: 12px; padding: 15px; margin-top: auto; border: 1px solid #ddd6fe; }
        .ai-text { font-size: 0.9rem; color: #5b21b6; margin: 0; font-weight: 600; }
        
        .loading { text-align: center; padding: 100px 0; color: #94a3b8; grid-column: 1 / -1; }
    </style>
</head>
<body>
    <header>
        <h1>🎭 幕前 <span class="logo-stage">Stage</span></h1>
        <p class="subtitle">為您從海量資料中挑選「對」的展演</p>
    </header>

    <div class="filter-wrapper">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="changeCity('全部', this)">全部</button>
            <button class="filter-btn" onclick="changeCity('台北', this)">台北</button>
            <button class="filter-btn" onclick="changeCity('桃園', this)">桃園</button>
            <button class="filter-btn" onclick="changeCity('新竹', this)">新竹</button>
            <button class="filter-btn" onclick="changeCity('台中', this)">台中</button>
            <button class="filter-btn" onclick="changeCity('台南', this)">台南</button>
            <button class="filter-btn" onclick="changeCity('高雄', this)">高雄</button>
        </div>
    </div>

    <main id="event-container">
        <div class="loading">✨ 正在整理精采展演...</div>
    </main>

    <script>
        async function fetchEvents(city = '全部') {
            const container = document.getElementById('event-container');
            container.innerHTML = '<div class="loading">🔍 搜尋 ' + city + ' 中...</div>';
            
            try {
                const response = await fetch(`/api/events?city=${city}`);
                const events = await response.json();
                
                if (events.length === 0) {
                    container.innerHTML = '<div class="loading">😭 暫時沒有活動，換個城市試試？</div>';
                    return;
                }

                container.innerHTML = `<div class="event-grid">${events.map(event => `
                    <div class="card">
                        <img class="card-img" src="${event.img}" 
                             onerror="this.onerror=null; this.src='${event.fallbackImg}';" 
                             alt="活動圖片">
                        <div class="card-body">
                            <h3>${event.title}</h3>
                            <div class="meta">📍 ${event.location}</div>
                            <div class="meta">📅 ${event.date}</div>
                            <div class="ai-box">
                                <p class="ai-text">${event.aiSummary}</p>
                            </div>
                        </div>
                    </div>
                `).join('')}</div>`;
            } catch (error) {
                container.innerHTML = '<div class="loading">連線失敗，請稍後再試 😭</div>';
            }
        }

        function changeCity(city, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchEvents(city);
        }

        fetchEvents();
    </script>
</body>
</html>
