<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幕前 Stage | 台灣展演 AI 懶人包</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root { 
            --primary: #6366f1; --accent: #bef264; --bg: #020617;
        }

        /* 💡 修正 1：流動光線背景層 (視覺效果更強) */
        .stage-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: var(--bg);
            overflow: hidden;
        }
        .light-beam {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            border-radius: 50%; filter: blur(50px);
            animation: moveLight 20s infinite alternate;
        }
        .light-beam:nth-child(2) { 
            background: radial-gradient(circle, rgba(190, 242, 100, 0.1) 0%, transparent 70%);
            animation-duration: 25s; animation-delay: -5s; 
        }
        @keyframes moveLight {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(110%, 110%); }
        }

        body { margin: 0; font-family: 'PingFang TC', sans-serif; color: white; min-height: 100vh; padding-bottom: 80px; }
        
        .cat-bar {
            display: flex; justify-content: center; gap: 10px; padding: 15px;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cat-item { color: #94a3b8; cursor: pointer; font-weight: 600; padding: 8px 16px; transition: 0.3s; font-size: 0.85rem; }
        .cat-item.active { color: var(--accent); background: rgba(190, 242, 100, 0.1); border-radius: 50px; }

        header { padding: 40px 20px; text-align: center; }
        header h1 { font-size: 2rem; margin: 0; letter-spacing: 2px; text-shadow: 0 0 20px var(--primary); }

        .filter-wrapper {
            background: rgba(2, 6, 23, 0.7); backdrop-filter: blur(15px);
            position: sticky; top: 62px; z-index: 900; padding: 12px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; max-width: 1200px; margin: 0 auto; scrollbar-width: none; }
        .filter-btn { padding: 8px 20px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.15); background: rgba(255, 255, 255, 0.05); color: white; cursor: pointer; font-size: 0.8rem; }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); }

        .search-area { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        #search-box { width: 100%; padding: 12px 18px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: white; outline: none; }

        main { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; align-items: stretch; }

        /* 💡 修正 2：卡片絕對對齊邏輯 */
        .card {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px);
            border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; height: 100%; transition: 0.3s; position: relative;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .img-container { width: 100%; height: 160px; background: #1e293b; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }

        .card-body { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; text-decoration: none; color: inherit; }
        h3 { margin: 0 0 10px 0; font-size: 1rem; line-height: 1.4; color: #f8fafc; font-weight: 700; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { font-size: 0.75rem; color: #94a3b8; margin-bottom: 6px; }

        .card-footer { padding: 12px 18px; background: rgba(15, 23, 42, 0.4); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; margin-top: auto; }
        .btn-link { color: var(--accent); text-decoration: none; font-size: 0.75rem; font-weight: 700; }
        .btn-org { font-size: 0.7rem; color: #64748b; text-decoration: none; }

        .loader { width: 40px; height: 40px; border: 4px solid var(--accent); border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="stage-bg">
        <div class="light-beam"></div>
        <div class="light-beam"></div>
    </div>

    <div class="cat-bar">
        <div class="cat-item active" onclick="changeCategory('視覺', this)">視覺藝術</div>
        <div class="cat-item" onclick="changeCategory('音樂', this)">音樂表演</div>
        <div class="cat-item" onclick="changeCategory('戲劇', this)">戲劇舞台</div>
        <div class="cat-item" onclick="changeCategory('市集', this)">市集/綜合</div>
    </div>

    <header><h1>🎭 幕前 Stage</h1></header>

    <div class="filter-wrapper">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="changeCity('全部', this)">全部</button>
            <button class="filter-btn" onclick="changeCity('台北', this)">台北</button>
            <button class="filter-btn" onclick="changeCity('台中', this)">台中</button>
            <button class="filter-btn" onclick="changeCity('高雄', this)">高雄</button>
        </div>
    </div>

    <div class="search-area"><input type="text" id="search-box" placeholder="🔍 搜尋活動名稱、場館..."></div>
    <main id="event-container"></main>

    <script>
        let allEvents = [];
        let currentCity = '全部', currentCategory = '視覺';
        
        async function fetchEvents() {
            const container = document.getElementById('event-container');
            container.innerHTML = `<div style="text-align:center; padding:100px;"><span class="loader"></span></div>`;
            try {
                const res = await fetch(`/api/events?city=${currentCity}&category=${currentCategory}`);
                allEvents = await res.json();
                renderEvents(allEvents);
            } catch (e) { container.innerHTML = '連線失敗 😭'; }
        }

        function renderEvents(events) {
            const container = document.getElementById('event-container');
            if (events.length === 0) { container.innerHTML = '<div style="text-align:center; padding:50px;">😭 找不到活動</div>'; return; }
            container.innerHTML = `<div class="event-grid">${events.map(event => `
                <div class="card">
                    <a href="${event.url || '#'}" target="_blank" class="card-body">
                        <div class="img-container" style="margin:-18px -18px 15px -18px;">
                            <img class="card-img" src="${event.img}" onerror="this.src='https://picsum.photos/600/400?random=${event.id}';">
                        </div>
                        <h3>${event.title}</h3>
                        <div class="meta">📍 ${event.location}</div>
                        <div class="meta">📅 ${event.date}</div>
                    </a>
                    <div class="card-footer">
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.searchQuery)}" target="_blank" class="btn-link">📍 地圖</a>
                        <a href="${event.backupUrl}" target="_blank" class="btn-org">詳細資訊</a>
                    </div>
                </div>`).join('')}</div>`;
        }

        function filterEvents() {
            const term = document.getElementById('search-box').value.toLowerCase();
            renderEvents(allEvents.filter(e => e.title.toLowerCase().includes(term) || e.location.toLowerCase().includes(term)));
        }

        function changeCity(city, btn) { currentCity = city; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); fetchEvents(); }
        function changeCategory(cat, el) { currentCategory = cat; document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); fetchEvents(); }
        fetchEvents();
    </script>
</body>
</html>
