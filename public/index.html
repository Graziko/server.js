<style>
    /* 新增：地區按鈕的樣式 */
    .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
    .filter-btn { 
        padding: 8px 16px; border-radius: 20px; border: 1px solid #e2e8f0; 
        background: white; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
    }
    .filter-btn.active { background: #6366f1; color: white; border-color: #6366f1; }
</style>

<body>
    <header>
        <h1>🎭 幕前 Stage</h1>
        <p class="subtitle">台灣展演活動的 AI 懶人包</p>
    </header>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="changeCity('全部', this)">全部</button>
        <button class="filter-btn" onclick="changeCity('台北', this)">台北</button>
        <button class="filter-btn" onclick="changeCity('台中', this)">台中</button>
        <button class="filter-btn" onclick="changeCity('高雄', this)">高雄</button>
    </div>

    <div id="event-container">
        <div class="loading">✨ 正在為您挑選精采展演...</div>
    </div>

    <script>
        let currentCity = '全部';

        async function fetchEvents(city = '全部') {
            const container = document.getElementById('event-container');
            container.innerHTML = '<div class="loading">🔍 正在搜尋 ' + city + ' 的活動...</div>';
            
            try {
                const response = await fetch(`/api/events?city=${city}`);
                const events = await response.json();
                
                if (events.length === 0) {
                    container.innerHTML = '<div class="loading">😭 該地區暫時沒有活動</div>';
                    return;
                }

                container.innerHTML = events.map(event => `
                    <div class="card">
                        <span class="tag">視覺藝術</span>
                        <h3>${event.title}</h3>
                        <div class="info">📍 ${event.location}</div>
                        <div class="info">📅 ${event.date}</div>
                        <div class="ai-box">
                            <div class="ai-title">🤖 幕前 AI 點評</div>
                            <p class="ai-content">${event.aiSummary}</p>
                        </div>
                        <p class="desc">${event.description}</p>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<div class="loading">連線失敗 😭</div>';
            }
        }

        function changeCity(city, btn) {
            // 切換按鈕顏色
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // 重新抓取資料
            fetchEvents(city);
        }

        fetchEvents();
    </script>
</body>
