<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幕前 Stage | 台灣展演 AI 懶人包</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --aurora: #4f46e5; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding-bottom: 80px; }
        
        header { 
            position: relative; background-color: #0d1117; color: white; padding: 60px 20px; text-align: center; overflow: hidden;
            background-image: radial-gradient(at 10% 10%, var(--aurora) 0px, transparent 50%), radial-gradient(at 90% 20%, #7e22ce 0px, transparent 50%), radial-gradient(at 50% 90%, #f43f5e 0px, transparent 50%);
            clip-path: ellipse(150% 100% at 50% 0%);
        }

        .cat-bar { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #0f172a; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .cat-item { color: #94a3b8; cursor: pointer; font-weight: 600; font-size: 0.85rem; padding: 8px 12px; white-space: nowrap; }
        .cat-item.active { color: #bef264; background: rgba(190, 242, 100, 0.1); border-radius: 8px; }

        .filter-wrapper { background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); position: sticky; top: 52px; z-index: 900; padding: 12px 0; border-bottom: 1px solid #e2e8f0; }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .filter-btn { padding: 8px 20px; border-radius: 50px; border: 1px solid #cbd5e1; background: white; white-space: nowrap; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        main { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 25px; }
        
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .card-body { padding: 20px; flex-grow: 1; }
        h3 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.4; height: 3rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .card-footer { padding: 12px 20px; background: #fcfcfc; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .share-group { display: flex; gap: 15px; align-items: center; }
        .share-icon { width: 22px; height: 22px; cursor: pointer; transition: 0.2s; }
        .btn-map { color: var(--primary); text-decoration: none; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
        .btn-fav { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #cbd5e1; }
        .btn-fav.active { color: #f43f5e; }

        /* 💡 終極修正：超明顯的提示框 */
        #share-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 3000; text-align: center; width: 80%; max-width: 300px;
        }
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2999;
        }
        .modal-btn { background: #e1306c; color: white; border: none; padding: 10px 20px; border-radius: 10px; margin-top: 15px; cursor: pointer; font-weight: 600; width: 100%; }
    </style>
</head>
<body>
    <div id="modal-overlay" onclick="closeModal()"></div>
    <div id="share-modal">
        <h2 style="margin: 0 0 10px 0; font-size: 1.2rem;">✨ 已複製活動資訊</h2>
        <p style="font-size: 0.9rem; color: #64748b;">請到 Instagram 貼上分享吧！</p>
        <button class="modal-btn" onclick="window.open('https://www.instagram.com/')">前往 Instagram</button>
    </div>

    <div class="cat-bar">
        <div class="cat-item active" onclick="changeCategory('視覺', this)">視覺藝術</div>
        <div class="cat-item" onclick="changeCategory('音樂', this)">音樂表演</div>
        <div class="cat-item" onclick="changeCategory('戲劇', this)">戲劇舞台</div>
        <div class="cat-item" onclick="changeCategory('舞蹈', this)">舞蹈藝術</div>
        <div class="cat-item" onclick="changeCategory('講座', this)">講座展覽</div>
    </div>

    <header>
        <h1>🎭 幕前 <span class="logo-stage">Stage</span></h1>
        <p class="subtitle">為您挑選最適合的台灣展演活動</p>
    </header>

    <div class="filter-wrapper">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="changeCity('全部', this)">全部</button>
            <button class="filter-btn" onclick="changeCity('台北', this)">台北</button>
            <button class="filter-btn" onclick="changeCity('台中', this)">台中</button>
            <button class="filter-btn" onclick="changeCity('高雄', this)">高雄</button>
        </div>
    </div>

    <main id="event-container"></main>

    <script>
        let currentCity = '全部';
        let currentCategory = '視覺';
        let favorites = JSON.parse(localStorage.getItem('stage_favs')) || [];
        const themes = { '視覺': '#4f46e5', '音樂': '#f43f5e', '戲劇': '#7e22ce', '舞蹈': '#10b981', '講座': '#f59e0b' };

        async function fetchEvents() {
            const container = document.getElementById('event-container');
            container.innerHTML = '<div class="loading">✨ 載入中...</div>';
            try {
                const response = await fetch(`/api/events?city=${currentCity}&category=${currentCategory}`);
                const events = await response.json();
                container.innerHTML = `<div class="event-grid">${events.map((event, index) => {
                    const isFav = favorites.includes(event.id) ? 'active' : '';
                    const shareMsg = `🎭 幕前 Stage 推薦：【${event.title}】\n📍 地點：${event.location}\n📅 日期：${event.date}`;
                    const shareUrl = window.location.href;

                    return `
                    <div class="card">
                        <img class="card-img" src="${event.img}" onerror="this.src='https://picsum.photos/600/400?random=${event.id}';">
                        <div class="card-body">
                            <h3>${event.title}</h3>
                            <div class="meta">📍 ${event.location}</div>
                            <div class="meta">📅 ${event.date}</div>
                        </div>
                        <div class="card-footer">
                            <div class="share-group">
                                <span class="btn-map" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.searchQuery)}')">📍 地圖</span>
                                <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="share-icon" onclick="window.open('https://line.me/R/msg/text/?${encodeURIComponent(shareMsg + '\n' + shareUrl)}')">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="share-icon" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}')">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="share-icon" onclick="finalIGShare('${shareMsg}', '${shareUrl}')">
                            </div>
                            <button class="btn-fav ${isFav}" onclick="toggleFav('${event.id}', this)">❤</button>
                        </div>
                    </div>`;
                }).join('')}</div>`;
            } catch (error) { container.innerHTML = '連線失敗 😭'; }
        }

        // 💡 終極分享邏輯
        async function finalIGShare(text, url) {
            const fullContent = text + "\n\n🔗 詳情請看：" + url;
            
            // 優先嘗試手機版原生分享
            if (navigator.share && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                try {
                    await navigator.share({ title: '幕前 Stage', text: fullContent, url: url });
                } catch (err) { console.log('User cancelled'); }
            } else {
                // 電腦版或不支援原生分享時：強制複製並跳出視窗
                const el = document.createElement('textarea');
                el.value = fullContent;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                // 顯示提示視窗
                document.getElementById('modal-overlay').style.display = 'block';
                document.getElementById('share-modal').style.display = 'block';
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('share-modal').style.display = 'none';
        }

        function changeCity(city, btn) { currentCity = city; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); fetchEvents(); }
        function changeCategory(cat, el) { currentCategory = cat; document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); document.documentElement.style.setProperty('--aurora', themes[cat]); fetchEvents(); }
        function toggleFav(id, btn) { if (favorites.includes(id)) { favorites = favorites.filter(f => f !== id); btn.classList.remove('active'); } else { favorites.push(id); btn.classList.add('active'); } localStorage.setItem('stage_favs', JSON.stringify(favorites)); }
        fetchEvents();
    </script>
</body>
</html>
