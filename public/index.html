<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幕前 Stage — 台灣展演 AI 懶人包</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --ai-bg: #f5f3ff; --ai-border: #c4b5fd; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #1e293b; max-width: 600px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        header { text-align: center; padding: 40px 0; }
        h1 { font-size: 2.2rem; margin: 0; letter-spacing: -1px; }
        .subtitle { color: #64748b; margin-top: 8px; font-size: 1rem; }
        
        #event-container { display: flex; flex-direction: column; gap: 24px; }
        .card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .tag { background: #e0e7ff; color: #4338ca; padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; display: inline-block; margin-bottom: 12px; }
        h3 { margin: 0 0 12px 0; font-size: 1.3rem; color: #0f172a; }
        .info { font-size: 0.85rem; color: #64748b; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        
        /* 🤖 AI 點評專屬樣式 */
        .ai-box { background: var(--ai-bg); border: 1px solid var(--ai-border); padding: 16px; border-radius: 12px; margin: 20px 0; position: relative; }
        .ai-title { color: #5b21b6; font-weight: 800; font-size: 0.9rem; display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
        .ai-content { font-size: 0.95rem; color: #4c1d95; margin: 0; }
        
        .desc { font-size: 0.9rem; color: #475569; border-top: 1px dashed #e2e8f0; pt: 16px; margin-top: 16px; padding-top: 16px; }
        .loading { text-align: center; padding: 60px; color: #94a3b8; font-weight: 500; }
    </style>
</head>
<body>
    <header>
        <h1>🎭 幕前 Stage</h1>
        <p class="subtitle">台灣展演活動的 AI 懶人包</p>
    </header>

    <div id="event-container">
        <div class="loading">✨ 正在為您挑選精采展演...</div>
    </div>

    <script>
        async function fetchEvents() {
            try {
                const response = await fetch('/api/events');
                const events = await response.json();
                const container = document.getElementById('event-container');
                
                container.innerHTML = events.map(event => `
                    <div class="card">
                        <span class="tag">視覺藝術</span>
                        <h3>${event.title}</h3>
                        <div class="info">📍 ${event.location}</div>
                        <div class="info">📅 ${event.date}</div>
                        
                        <div class="ai-box">
                            <div class="ai-title">🤖 幕前 AI 點評</div>
                            <p class="ai-content">${event.aiSummary}</p>
                        </div>
                        
                        <p class="desc">${event.description}</p>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('event-container').innerHTML = '<div class="loading">哎呀！資料暫時斷線了 😭</div>';
            }
        }
        fetchEvents();
    </script>
</body>
</html>
