<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幕前 Stage | 台灣展演 AI 懶人包</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root { 
            --primary: #6366f1; 
            --accent: #bef264; 
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        /* 💡 核心：動態流動背景 */
        body {
            margin: 0;
            padding-bottom: 80px;
            font-family: 'PingFang TC', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: auroraFlow 15s ease infinite;
            color: white;
            min-height: 100vh;
        }

        @keyframes auroraFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 💡 毛玻璃頂部欄 */
        .cat-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cat-item { color: #94a3b8; cursor: pointer; font-weight: 600; padding: 8px 16px; white-space: nowrap; transition: 0.3s; }
        .cat-item.active { color: var(--accent); background: rgba(190, 242, 100, 0.1); border-radius: 50px; }

        header {
            padding: 60px 20px;
            text-align: center;
            background: transparent;
        }

        header h1 { font-size: 2.5rem; margin: 0; letter-spacing: 2px; text-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
        header p { opacity: 0.7; font-size: 0.9rem; margin-top: 10px; }

        /* 💡 篩選列 */
        .filter-wrapper {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 62px;
            z-index: 900;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; max-width: 1200px; margin: 0 auto; scrollbar-width: none; }
        .filter-btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            white-space: nowrap;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }

        .search-area { max-width: 1200px; margin: 25px auto; padding: 0 20px; }
        #search-box {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            backdrop-filter: blur(5px);
        }

        main { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; align-items: stretch; }

        /* 💡 卡片設計強化 */
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .tag { position: absolute; top: 15px; left: 15px; background: var(--primary); color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; z-index: 5; }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #1e293b; display: block; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card-body { padding: 22px; flex-grow: 1; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        
        h3 { margin: 0 0 12px 0; font-size: 1.1rem; line-height: 1.5; font-weight: 700; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; color: #f8fafc; }
        .meta { font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        
        .card-footer { padding: 15px 22px; background: rgba(15, 23, 42, 0.5); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; }
        .btn-link { color: var(--accent); text-decoration: none; font-size: 0.8rem; font-weight: 800; }
        .btn-org { font-size: 0.75rem; color: #64748b; text-decoration: none; }

        /* 載入動畫 */
        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 0; grid-column: 1 / -1; }
        .loader { width: 50px; height: 50px; border: 4px solid var(--accent); border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; box-shadow: 0 0 15px var(--accent); }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="cat-bar">
        <div class="cat-item active" onclick="changeCategory('視覺', this)">視覺藝術</div>
        <div class="cat-item" onclick="changeCategory('音樂', this)">音樂表演</div>
        <div class="cat-item" onclick="changeCategory('戲劇', this)">戲劇舞台</div>
        <div class="cat-item" onclick="changeCategory('市集', this)">市集/綜合</div>
    </div>

    <header>
        <h1>🎭 幕前 Stage</h1>
        <p>全台展演．光影追蹤</p>
    </header>

    <div class="filter-wrapper">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="changeCity('全部', this)">全部</button>
            <button class="filter-btn" onclick="changeCity('台北', this)">台北</button>
            <button class="filter-btn" onclick="changeCity('台中', this)">台中</button>
            <button class="filter-btn" onclick="changeCity('高雄', this)">高雄</button>
        </div>
    </div>

    <div class="search-area"><input type="text" id="search-box" placeholder="🔍 搜尋活動名稱、場館..."></div>
    
    <main id="event-container"></main>

    <script>
        let allEvents = [];
        let currentCity = '全部', currentCategory = '視覺';
        
        async function fetchEvents() {
            const container = document.getElementById('event-container');
            container.innerHTML = `<div class="loading-container"><span class="loader"></span></div>`;
            try {
                const res = await fetch(`/api/events?city=${currentCity}&category=${currentCategory}`);
                allEvents = await res.json();
                renderEvents(allEvents);
            } catch (e) { container.innerHTML = '<div class="loading-container">連線超時 😭</div>'; }
        }

        function renderEvents(events) {
            const container = document.getElementById('event-container');
            if (events.length === 0) { container.innerHTML = '<div class="loading-container">😭 找不到活動</div>'; return; }
            container.innerHTML = `<div class="event-grid">${events.map(event => `
                <div class="card">
                    <div class="tag">${event.tag}</div>
                    <a href="${event.mainUrl}" target="_blank" class="card-link" style="text-decoration:none; color:inherit; display:contents;">
                        <img class="card-img" src="${event.img}" onerror="this.src='https://picsum.photos/600/400?random=${event.id}';">
                        <div class="card-body">
                            <h3>${event.title}</h3>
                            <div class="meta">📍 ${event.location}</div>
                            <div class="meta">📅 ${event.date}</div>
                        </div>
                    </a>
                    <div class="card-footer">
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.searchQuery)}" target="_blank" class="btn-link">📍 地圖導航</a>
                        <a href="${event.backupUrl}" target="_blank" class="btn-org">詳細資訊</a>
                    </div>
                </div>`).join('')}</div>`;
        }

        function filterEvents() {
            const term = document.getElementById('search-box').value.toLowerCase();
            renderEvents(allEvents.filter(e => e.title.toLowerCase().includes(term) || e.location.toLowerCase().includes(term)));
        }

        function changeCity(city, btn) { currentCity = city; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); fetchEvents(); }
        function changeCategory(cat, el) { currentCategory = cat; document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); fetchEvents(); }
        fetchEvents();
    </script>
</body>
</html>
