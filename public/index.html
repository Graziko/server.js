<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幕前 Stage | 台灣展演 AI 懶人包</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --aurora: #4f46e5; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding-bottom: 80px; }
        
        /* 🎨 動態極光 Header */
        header { 
            position: relative; background-color: #0d1117; color: white; padding: 60px 20px; text-align: center; overflow: hidden;
            transition: background 1s ease;
            background-image: 
                radial-gradient(at 10% 10%, var(--aurora) 0px, transparent 50%),
                radial-gradient(at 90% 20%, #7e22ce 0px, transparent 50%),
                radial-gradient(at 50% 90%, #f43f5e 0px, transparent 50%);
        }

        /* 分類導航列 (最上方) */
        .cat-bar { display: flex; justify-content: center; gap: 20px; padding: 20px; background: #1e293b; }
        .cat-item { color: #94a3b8; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.3s; padding: 5px 10px; }
        .cat-item.active { color: #bef264; border-bottom: 2px solid #bef264; }

        /* 縣市篩選列 */
        .filter-wrapper { position: sticky; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); z-index: 100; padding: 12px 0; border-bottom: 1px solid #e2e8f0; }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .filter-btn { padding: 8px 20px; border-radius: 50px; border: 1px solid #cbd5e1; background: white; white-space: nowrap; cursor: pointer; font-weight: 600; color: #475569; font-size: 0.9rem; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        /* 卡片設計與按鈕 */
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #e2e8f0; }
        .card-body { padding: 20px; flex-grow: 1; }
        
        h3 { margin: 0 0 10px 0; font-size: 1.15rem; height: 3.2rem; overflow: hidden; }
        .meta { font-size: 0.85rem; color: #64748b; margin-bottom: 5px; }

        .ai-box { background: #f5f3ff; border-radius: 10px; padding: 12px; margin: 15px 0; font-size: 0.85rem; color: #5b21b6; border-left: 3px solid #8b5cf6; }

        /* 按鈕區塊 */
        .card-footer { padding: 15px 20px; background: #fcfcfc; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .btn-map { color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .btn-fav { background: none; border: none; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn-fav.active { color: #f43f5e; transform: scale(1.2); }
        
        .loading { text-align: center; padding: 100px 0; color: #94a3b8; grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="cat-bar">
        <div class="cat-item active" onclick="changeCategory('視覺', this)">視覺藝術</div>
        <div class="cat-item" onclick="changeCategory('音樂', this)">音樂表演</div>
        <div class="cat-item" onclick="changeCategory('戲劇', this)">戲劇舞台</div>
        <div class="cat-item" onclick="changeCategory('舞蹈', this)">舞蹈藝術</div>
        <div class="cat-item" onclick="changeCategory('講座', this)">講座展覽</div>
    </div>

    <header id="main-header">
        <h1>🎭 幕前 Stage</h1>
        <p class="subtitle">為您從海量資料中挑選「對」的展演</p>
    </header>

    <div class="filter-wrapper">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="changeCity('全部', this)">全部</button>
            <button class="filter-btn" onclick="changeCity('台北', this)">台北</button>
            <button class="filter-btn" onclick="changeCity('桃園', this)">桃園</button>
            <button class="filter-btn" onclick="changeCity('台中', this)">台中</button>
            <button class="filter-btn" onclick="changeCity('高雄', this)">高雄</button>
        </div>
    </div>

    <main id="event-container"></main>

    <script>
        let currentCity = '全部';
        let currentCategory = '視覺';
        let favorites = JSON.parse(localStorage.getItem('stage_favs')) || [];

        // 極光配色方案
        const themes = { '視覺': '#4f46e5', '音樂': '#f43f5e', '戲劇': '#7e22ce', '舞蹈': '#10b981', '講座': '#f59e0b' };

        async function fetchEvents() {
            const container = document.getElementById('event-container');
            container.innerHTML = '<div class="loading">✨ 正在調度 ' + currentCategory + ' 資料...</div>';
            
            try {
                const response = await fetch(`/api/events?city=${currentCity}&category=${currentCategory}`);
                const events = await response.json();
                
                container.innerHTML = `<div class="event-grid">${events.map(event => {
                    const isFav = favorites.includes(event.id) ? 'active' : '';
                    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.location + ' ' + event.address)}`;
                    
                    return `
                    <div class="card">
                        <img class="card-img" src="${event.img}" onerror="this.src='${event.fallbackImg}';">
                        <div class="card-body">
                            <h3>${event.title}</h3>
                            <div class="meta">📍 ${event.location}</div>
                            <div class="meta">📅 ${event.date}</div>
                            <div class="ai-box">${event.aiSummary}</div>
                        </div>
                        <div class="card-footer">
                            <a href="${mapUrl}" target="_blank" class="btn-map">📍 開啟地圖</a>
                            <button class="btn-fav ${isFav}" onclick="toggleFav('${event.id}', this)">❤</button>
                        </div>
                    </div>`;
                }).join('')}</div>`;
            } catch (error) { container.innerHTML = '<div class="loading">連線失敗 😭</div>'; }
        }

        function changeCity(city, btn) {
            currentCity = city;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchEvents();
        }

        function changeCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            // 切換極光主題色
            document.documentElement.style.setProperty('--aurora', themes[cat]);
            fetchEvents();
        }

        function toggleFav(id, btn) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(fav => fav !== id);
                btn.classList.remove('active');
            } else {
                favorites.push(id);
                btn.classList.add('active');
            }
            localStorage.setItem('stage_favs', JSON.stringify(favorites));
        }

        fetchEvents();
    </script>
</body>
</html>
