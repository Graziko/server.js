<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幕前 Stage | 台灣展演 AI 懶人包</title>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; /* 稍微深一點點的背景，讓白色卡片更跳 */ }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding-bottom: 50px; }
        
        header { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; padding: 60px 20px; text-align: center; }
        h1 { font-size: 2.8rem; margin: 0; font-weight: 800; }

        .filter-wrapper { position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 100; padding: 15px 0; border-bottom: 1px solid #e2e8f0; }
        .filter-bar { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .filter-btn { padding: 10px 24px; border-radius: 50px; border: 1px solid #cbd5e1; background: white; white-space: nowrap; cursor: pointer; font-weight: 600; color: #475569; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        /* 💡 解決太白的問題：使用 Grid 網格系統 */
        main { max-width: 1200px; /* 放大最大寬度 */ margin: 40px auto; padding: 0 20px; }
        .event-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); /* 自動填滿，最少 320px */
            gap: 30px; 
        }
        
        .card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .card-img { width: 100%; height: 220px; object-fit: cover; background: #e2e8f0; transition: transform 0.5s; }
        .card:hover .card-img { transform: scale(1.05); }
        .card-body { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; }
        
        h3 { margin: 0 0 15px 0; font-size: 1.25rem; line-height: 1.4; color: #0f172a; height: 3.5rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .meta { font-size: 0.85rem; color: #64748b; margin-bottom: 6px; }

        .ai-box { background: #f5f3ff; border-radius: 12px; padding: 15px; margin-top: auto; /* 讓點評永遠在最下面對齊 */ border: 1px solid #ddd6fe; }
        .ai-text { font-size: 0.9rem; color: #5b21b6; margin: 0; font-weight: 600; }
        
        .loading { text-align: center; padding: 100px 0; color: #94a3b8; grid-column: 1 / -1; }
    </style>
</head>
<body>
    <header>
        <h1>🎭 幕前 Stage</h1>
        <p class="subtitle">為您從海量資料中挑選「對」的展演</p>
    </header>

    <div class="filter-wrapper">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="changeCity('全部', this)">全部</button>
            <button class="filter-btn" onclick="changeCity('台北', this)">台北</button>
            <button class="filter-btn" onclick="changeCity('桃園', this)">桃園</button>
            <button class="filter-btn" onclick="changeCity('新竹', this)">新竹</button>
            <button class="filter-btn" onclick="changeCity('台中', this)">台中</button>
            <button class="filter-btn" onclick="changeCity('台南', this)">台南</button>
            <button class="filter-btn" onclick="changeCity('高雄', this)">高雄</button>
        </div>
    </div>

    <main id="event-container">
        <div class="loading">✨ 正在整理精采展演...</div>
    </main>

    <script>
        async function fetchEvents(city = '全部') {
            const container = document.getElementById('event-container');
            container.innerHTML = '<div class="loading">🔍 搜尋 ' + city + ' 中...</div>';
            
            try {
                const response = await fetch(`/api/events?city=${city}`);
                const events = await response.json();
                
                if (events.length === 0) {
                    container.innerHTML = '<div class="loading">😭 暫時沒有活動，換個城市試試？</div>';
                    return;
                }

                container.innerHTML = `<div class="event-grid">${events.map(event => `
                    <div class="card">
                        <img class="card-img" src="${event.img}" 
                             onerror="this.onerror=null; this.src='${event.fallbackImg}';" 
                             alt="活動圖片">
                        <div class="card-body">
                            <h3>${event.title}</h3>
                            <div class="meta">📍 ${event.location}</div>
                            <div class="meta">📅 ${event.date}</div>
                            <div class="ai-box">
                                <p class="ai-text">${event.aiSummary}</p>
                            </div>
                        </div>
                    </div>
                `).join('')}</div>`;
            } catch (error) {
                container.innerHTML = '<div class="loading">連線失敗，請稍後再試 😭</div>';
            }
        }

        function changeCity(city, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchEvents(city);
        }

        fetchEvents();
    </script>
</body>
</html>
