<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幕前 Stage | 台灣展演 AI 懶人包</title>
    <style>
        :root { 
            --primary: #6366f1; 
            --bg: #f8fafc; 
            --aurora: #4f46e5; /* 初始極光顏色 */
        }

        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background: var(--bg); 
            color: #1e293b; 
            margin: 0; 
            padding-bottom: 80px; 
        }
        
        /* 🎨 頂部導覽列：分類切換 */
        .cat-bar { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            padding: 15px; 
            background: #0f172a; 
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .cat-item { 
            color: #94a3b8; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.9rem; 
            transition: 0.3s; 
            padding: 8px 12px;
            border-radius: 8px;
        }
        .cat-item.active { 
            color: #bef264; 
            background: rgba(190, 242, 100, 0.1);
        }

        /* 🎨 動態藝術 Header */
        header { 
            position: relative; 
            background-color: #0d1117; 
            color: white; 
            padding: 80px 20px 100px 20px; 
            text-align: center; 
            overflow: hidden;
            transition: background 1s ease; /* 切換顏色時有漸變感 */
            background-image: 
                radial-gradient(at 10% 10%, var(--aurora) 0px, transparent 50%),
                radial-gradient(at 90% 20%, #7e22ce 0px, transparent 50%),
                radial-gradient(at 50% 90%, #f43f5e 0px, transparent 50%);
            clip-path: ellipse(150% 100% at 50% 0%);
        }
        header::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: -2px; position: relative; z-index: 10; }
        h1 span.logo-stage { color: #bef264; }
        .subtitle { opacity: 0.8; font-weight: 300; margin-top: 15px; position: relative; z-index: 10; }

        /* 縣市篩選列 */
        .filter-wrapper { 
            background: rgba(255,255,255,0.8); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 0; 
            border-bottom: 1px solid #e2e8f0; 
            position: sticky;
            top: 54px; /* 接在 cat-bar 下面 */
            z-index: 900;
        }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; max-width: 1200px; margin: 0 auto; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { 
            padding: 8px 22px; border-radius: 50px; border: 1px solid #cbd5e1; 
            background: white; white-space: nowrap; cursor: pointer; 
            font-weight: 600; color: #475569; transition: 0.3s;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        /* 💡 響應式網格系統 (解決太白問題) */
        main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .event-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
        }
        
        /* 卡片與圖片效果 */
        .card { 
            background: white; border-radius: 24px; overflow: hidden; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0; display: flex; flex-direction: column; 
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); }
        
        .card-img { 
            width: 100%; height: 200px; object-fit: cover; background: #e2e8f0;
            /* 載入中的閃爍特效 */
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            background-size: 200% 100%;
            animation: shine 1.5s infinite;
        }
        @keyframes shine { to { background-position-x: -200%; } }

        .card-body { padding: 24px; flex-grow: 1; }
        h3 { margin: 0 0 12px 0; font-size: 1.25rem; line-height: 1.4; color: #0f172a; height: 3.5rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .meta { font-size: 0.85rem; color: #64748b; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }

        .ai-box { background: #f5f3ff; border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px solid #ddd6fe; }
        .ai-text { font-size: 0.9rem; color: #5b21b6; margin: 0; font-weight: 600; }

        /* 卡片底部按鈕 */
        .card-footer { 
            padding: 15px 24px; background: #fcfcfc; border-top: 1px solid #f1f5f9; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .btn-map { color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 700; }
        .btn-fav { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #cbd5e1; transition: 0.3s; }
        .btn-fav.active { color: #f43f5e; transform: scale(1.2); }
        
        .loading { text-align: center; padding: 100px 0; color: #94a3b8; grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="cat-bar">
        <div class="cat-item active" onclick="changeCategory('視覺', this)">視覺藝術</div>
        <div class="cat-item" onclick="changeCategory('音樂', this)">音樂表演</div>
        <div class="cat-item" onclick="changeCategory('戲劇', this)">戲劇舞台</div>
        <div class="cat-item" onclick="changeCategory('舞蹈', this)">舞蹈藝術</div>
        <div class="cat-item" onclick="changeCategory('講座', this)">講座展覽</div>
    </div>

    <header>
        <h1>🎭 幕前 <span class="logo-stage">Stage</span></h1>
        <p class="subtitle">為您從海量資料中挑選「對」的展演</p>
    </header>

    <div class="filter-wrapper">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="changeCity('全部', this)">全部地區</button>
            <button class="filter-btn" onclick="changeCity('台北', this)">台北</button>
            <button class="filter-btn" onclick="changeCity('桃園', this)">桃園</button>
            <button class="filter-btn" onclick="changeCity('台中', this)">台中</button>
            <button class="filter-btn" onclick="changeCity('台南', this)">台南</button>
            <button class="filter-btn" onclick="changeCity('高雄', this)">高雄</button>
        </div>
    </div>

    <main id="event-container">
        <div class="loading">✨ 正在整理精采展演...</div>
    </main>

    <script>
        let currentCity = '全部';
        let currentCategory = '視覺';
        // 從瀏覽器記憶體讀取收藏清單
        let favorites = JSON.parse(localStorage.getItem('stage_favs')) || [];

        // 主題色配色方案
        const themes = {
            '視覺': '#4f46e5',
            '音樂': '#f43f5e',
            '戲劇': '#7e22ce',
            '舞蹈': '#10b981',
            '講座': '#f59e0b'
        };

        async function fetchEvents() {
            const container = document.getElementById('event-container');
            container.innerHTML = '<div class="loading">🔍 搜尋 ' + currentCity + ' 的 ' + currentCategory + ' 活動中...</div>';
            
            try {
                // 向後端 API 請求資料
                const response = await fetch(`/api/events?city=${currentCity}&category=${currentCategory}`);
                const events = await response.json();
                
                if (events.length === 0) {
                    container.innerHTML = '<div class="loading">😭 暫時沒有活動，換個類別或城市試試？</div>';
                    return;
                }

                container.innerHTML = `<div class="event-grid">${events.map((event, index) => {
                    const isFav = favorites.includes(event.id) ? 'active' : '';
                    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.location + ' ' + event.address)}`;
                    
                    // 💡 解決縮圖重複：在 fallbackImg 後面加上隨機參數 index 與時間戳記
                    const uniqueFallback = `https://picsum.photos/600/400?random=${event.id}_${index}`;

                    return `
                    <div class="card">
                        <img class="card-img" src="${event.img}" 
                             onerror="this.onerror=null; this.src='${uniqueFallback}';" 
                             alt="活動圖片" style="animation: none; background: #eee;">
                        <div class="card-body">
                            <h3>${event.title}</h3>
                            <div class="meta">📍 ${event.location}</div>
                            <div class="meta">📅 ${event.date}</div>
                            <div class="ai-box">
                                <p class="ai-text">${event.aiSummary}</p>
                            </div>
                        </div>
                        <div class="card-footer">
                            <a href="${mapUrl}" target="_blank" class="btn-map">📍 地圖導航</a>
                            <button class="btn-fav ${isFav}" onclick="toggleFav('${event.id}', this)">❤</button>
                        </div>
                    </div>
                `).join('')}</div>`;
            } catch (error) {
                container.innerHTML = '<div class="loading">連線失敗，請重新整理 😭</div>';
            }
        }

        function changeCity(city, btn) {
            currentCity = city;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchEvents();
        }

        function changeCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            // 切換極光顏色
            document.documentElement.style.setProperty('--aurora', themes[cat]);
            fetchEvents();
        }

        function toggleFav(id, btn) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(fav => fav !== id);
                btn.classList.remove('active');
            } else {
                favorites.push(id);
                btn.classList.add('active');
            }
            // 存入 LocalStorage
            localStorage.setItem('stage_favs', JSON.stringify(favorites));
        }

        // 初始載入
        fetchEvents();
    </script>
</body>
</html>
