<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幕前 Stage | 台灣展演 AI 懶人包</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --aurora: #4f46e5; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding-bottom: 80px; }
        header { 
            background-color: #0d1117; color: white; padding: 60px 20px; text-align: center;
            background-image: radial-gradient(at 10% 10%, var(--aurora) 0px, transparent 50%), radial-gradient(at 90% 20%, #7e22ce 0px, transparent 50%), radial-gradient(at 50% 90%, #f43f5e 0px, transparent 50%);
            clip-path: ellipse(150% 100% at 50% 0%);
        }
        .cat-bar { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #0f172a; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        .cat-item { color: #94a3b8; cursor: pointer; font-weight: 600; padding: 8px 12px; white-space: nowrap; }
        .cat-item.active { color: #bef264; background: rgba(190, 242, 100, 0.1); border-radius: 8px; }
        .filter-wrapper { background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); position: sticky; top: 52px; z-index: 900; padding: 12px 0; border-bottom: 1px solid #eee; }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; max-width: 1200px; margin: 0 auto; }
        .search-area { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        #search-box { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; outline: none; }
        
        main { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        
        /* 💡 讓整個連結區域變明顯 */
        .card-link { text-decoration: none; color: inherit; display: block; }
        .card-link:hover h3 { color: var(--primary); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .card-body { padding: 20px; flex-grow: 1; }
        h3 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.4; height: 3rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; transition: 0.2s; }
        
        .card-footer { padding: 12px 20px; background: #fcfcfc; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .share-group { display: flex; gap: 15px; align-items: center; }
        .share-icon { width: 22px; height: 22px; cursor: pointer; }
        .btn-map { color: var(--primary); text-decoration: none; font-size: 0.8rem; font-weight: 700; }

        /* 彈窗：專治 Brave */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2999; }
        #share-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; z-index: 3000; width: 85%; max-width: 320px; text-align: center; }
        #copy-area { width: 100%; height: 90px; margin: 15px 0; padding: 10px; border: 1px solid #ccc; border-radius: 10px; font-size: 0.85rem; box-sizing: border-box; }
        .modal-btn { background: #e1306c; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; }
        
        .loading { text-align: center; padding: 100px 0; color: #94a3b8; grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div id="modal-overlay" onclick="closeModal()"></div>
    <div id="share-modal">
        <h3 style="margin: 0; height: auto;">🎭 推坑資訊已生成</h3>
        <p style="font-size: 0.8rem; color: #666;">Brave 安全限制：請手動全選複製下方文字</p>
        <textarea id="copy-area" readonly></textarea>
        <button class="modal-btn" onclick="window.open('https://www.instagram.com/')">複製完畢，前往 IG</button>
    </div>

    <div class="cat-bar">
        <div class="cat-item active" onclick="changeCategory('視覺', this)">視覺藝術</div>
        <div class="cat-item" onclick="changeCategory('音樂', this)">音樂表演</div>
        <div class="cat-item" onclick="changeCategory('戲劇', this)">戲劇舞台</div>
        <div class="cat-item" onclick="changeCategory('市集', this)">熱門市集</div>
    </div>

    <header>
        <h1>🎭 幕前 Stage</h1>
        <p style="opacity:0.8">全台灣展演官網直達</p>
    </header>

    <div class="filter-wrapper">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="changeCity('全部', this)">全部</button>
            <button class="filter-btn" onclick="changeCity('台北', this)">台北</button>
            <button class="filter-btn" onclick="changeCity('台中', this)">台中</button>
            <button class="filter-btn" onclick="changeCity('高雄', this)">高雄</button>
        </div>
    </div>

    <div class="search-area">
        <input type="text" id="search-box" placeholder="🔍 搜尋活動或場館..." oninput="filterEvents()">
    </div>

    <main id="event-container"></main>

    <script>
        let allEvents = [];
        let currentCity = '全部', currentCategory = '視覺';
        const themes = { '視覺': '#4f46e5', '音樂': '#f43f5e', '戲劇': '#7e22ce', '市集': '#ec4899' };

        async function fetchEvents() {
            const container = document.getElementById('event-container');
            container.innerHTML = '<div class="loading">✨ 載入中...</div>';
            try {
                const response = await fetch(`/api/events?city=${currentCity}&category=${currentCategory}`);
                allEvents = await response.json();
                renderEvents(allEvents);
            } catch (e) { container.innerHTML = '連線失敗 😭'; }
        }

        function renderEvents(events) {
            const container = document.getElementById('event-container');
            container.innerHTML = `<div class="event-grid">${events.map(event => `
                <div class="card">
                    <a href="${event.officialUrl}" target="_blank" class="card-link">
                        <img class="card-img" src="${event.img}" onerror="this.src='https://picsum.photos/600/400?random=${event.id}';">
                        <div class="card-body">
                            <h3>${event.title}</h3>
                            <div class="meta">📍 ${event.location}</div>
                            <div class="meta">📅 ${event.date}</div>
                        </div>
                    </a>
                    <div class="card-footer">
                        <div class="share-group">
                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.searchQuery)}" target="_blank" class="btn-map">📍 地圖</a>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" class="share-icon" onclick="window.open('https://line.me/R/msg/text/?${encodeURIComponent(event.title + '\n' + event.officialUrl)}')">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="share-icon" onclick="openShareModal('${event.title}', '${event.officialUrl}')">
                        </div>
                    </div>
                </div>`).join('')}</div>`;
        }

        function filterEvents() {
            const term = document.getElementById('search-box').value.toLowerCase();
            renderEvents(allEvents.filter(e => e.title.toLowerCase().includes(term) || e.location.toLowerCase().includes(term)));
        }

        function openShareModal(title, url) {
            document.getElementById('copy-area').value = `🎭 推薦活動：【${title}】\n🔗 官網：${url}\n(來自：幕前 Stage)`;
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('share-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('share-modal').style.display = 'none'; }
        function changeCity(city, btn) { currentCity = city; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); fetchEvents(); }
        function changeCategory(cat, el) { currentCategory = cat; document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); document.documentElement.style.setProperty('--aurora', themes[cat]); fetchEvents(); }
        
        fetchEvents();
    </script>
</body>
</html>
